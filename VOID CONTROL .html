<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID INVESTMENT - SERVER CONTROL</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body { height:100vh; display:flex; justify-content:center; align-items:center; background:#050510; overflow:hidden; }
body::before { content:""; position:absolute; width:500px; height:500px; background:radial-gradient(circle,#7b2ff744,#00c6ff22,transparent 70%); filter:blur(60px); animation:bgMove 8s linear infinite; }
@keyframes bgMove { 50%{transform:scale(1.3);} 100%{transform:rotate(360deg);} }
.container { text-align:center; position:relative; z-index:2; }
.title { font-size:34px; font-weight:900; letter-spacing:6px; color:white; margin-bottom:18px; text-shadow:0 0 15px #7b2ff7; }
.void { height:60px; font-size:42px; font-weight:bold; letter-spacing:8px; opacity:0; margin-bottom:10px; background:linear-gradient(90deg,#7b2ff7,#00c6ff,#7b2ff7); background-size:300%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-shadow:0 0 20px #7b2ff7; }
.show { animation:voidAnim 1.5s ease; }
@keyframes voidAnim { 0%{opacity:0; transform:scale(.3); background-position:0%;} 50%{opacity:1; transform:scale(1.3); background-position:100%; filter:drop-shadow(0 0 30px #00c6ff);} 100%{opacity:0; transform:scale(1); background-position:0%;} }
.status { font-size:18px; font-weight:bold; color:#00ff95; margin-bottom:20px; transition:.4s; }
.circle { width:230px; height:230px; border-radius:50%; display:flex; justify-content:center; align-items:center; margin:auto; background:linear-gradient(135deg,#7b2ff7,#00c6ff); padding:6px; box-shadow:0 0 30px #7b2ff7, 0 0 60px #00c6ff; animation:ring 2s infinite; }
@keyframes ring { 50%{box-shadow:0 0 45px #7b2ff7, 0 0 90px #00c6ff;} }
button { width:190px; height:190px; border:none; border-radius:50%; background:#111; color:white; font-size:22px; font-weight:bold; cursor:pointer; transition:.4s; box-shadow:inset 0 0 20px #222; }
button:active { transform:scale(.95); }
.connected .circle { background:linear-gradient(135deg,#00ff95,#00d26a); box-shadow:0 0 40px #00ff95; }
.connected .status { color:#00ff95; }
.disconnected .circle { background:linear-gradient(135deg,#ff0040,#ff4d6d); box-shadow:0 0 40px #ff0040; }
.disconnected .status { color:#ff4d6d; }
</style>
</head>
<body>

<div class="container connected" id="box">
    <div class="title">VOID INVESTMENT</div>
    <div class="void" id="voidText">VOID</div>
    <div class="status" id="status">🟢 SERVER CONNECTED</div>
    <div class="circle"><button id="btn">CONNECTED</button></div>
</div>

<script>
const btn = document.getElementById("btn");
const box = document.getElementById("box");
const status = document.getElementById("status");
const txt = document.getElementById("voidText");

// பக்கத்தை திறக்கும்போது சர்வர் ஸ்டேட்டஸை "CONNECTED" என செட் செய்கிறது
localStorage.setItem("void_server_status", "CONNECTED");

btn.onclick = function() {
    txt.classList.remove("show");
    void txt.offsetWidth;
    txt.classList.add("show");

    if (box.classList.contains("connected")) {
        box.classList.remove("connected");
        box.classList.add("disconnected");
        status.innerHTML = "🔴 SERVER DISCONNECTED";
        btn.innerHTML = "DISCONNECTED";
        
        // மெயின் ஆப்பிற்கு லாக் சிக்னல் அனுப்புகிறது
        localStorage.setItem("void_server_status", "DISCONNECTED");
    } else {
        box.classList.remove("disconnected");
        box.classList.add("connected");
        status.innerHTML = "🟢 SERVER CONNECTED";
        btn.innerHTML = "CONNECTED";
        
        // மெயின் ஆப்பிற்கு அன்லாக் சிக்னல் அனுப்புகிறது
        localStorage.setItem("void_server_status", "CONNECTED");
    }
};
</script>
</body>
</html>
